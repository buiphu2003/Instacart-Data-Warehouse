version: 2

models:
  - name: mart_customer_rfm
    description: "Bảng tổng hợp phân tích hành vi khách hàng theo mô hình RFM (Recency, Frequency, Monetary)."
    columns:
      - name: customer_sk
        tests:
          - unique
          - not_null
      - name: rfm_segment
        tests:
          - accepted_values:
              values: ['VIP', 'Churned', 'New', 'Regular']

  - name: mart_order_returns_analysis
    description: "Bảng phân tích chi tiết nguyên nhân và lịch sử hoàn hàng của khách hàng (Grain = 1 Return)."
    columns:
      - name: return_sk
        tests:
          - unique
          - not_null
      - name: order_sk
        tests:
          - not_null
      - name: return_status
        tests:
          - not_null

  - name: mart_fulfillment_times
    description: "Bảng phân tích thời gian xử lý đơn hàng (Lead Time) dựa trên lịch sử thay đổi trạng thái."
    columns:
      - name: order_sk
        tests:
          - unique
          - not_null

  - name: mart_sales_performance_daily
    description: "Bảng báo cáo hiệu suất kinh doanh hàng ngày."
    columns:
      - name: date_id
        tests:
          - unique
          - not_null

  - name: mart_product_performance
    description: "Bảng phân tích hiệu suất bán hàng và tỷ lệ hoàn trả của từng sản phẩm (all-time aggregate)."
    columns:
      - name: product_sk
        tests:
          - unique
          - not_null

  - name: mart_sales_by_category
    description: >
      Doanh số bán hàng tổng hợp theo danh mục sản phẩm và tháng (ecommerce only).
      Grain: 1 row = 1 category × 1 năm × 1 tháng.
      Phục vụ: Category managers, Merchandising, Seasonal planning.
    columns:
      - name: category_name
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: month
        tests:
          - not_null
      - name: total_revenue
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: return_rate
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0 AND return_rate <= 1"

  - name: mart_payment_summary
    description: >
      Tổng hợp giao dịch thanh toán theo ngày và phương thức thanh toán.
      Grain: 1 row = 1 ngày × 1 payment_method.
      Phục vụ: Finance team, Payment ops, Executive dashboard.
    columns:
      - name: date_id
        tests:
          - not_null
      - name: payment_method
        tests:
          - not_null
          - accepted_values:
              values: ["CREDIT_CARD", "PAYPAL", "BANK_TRANSFER", "COD"]
              quote: true
      - name: success_rate
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0 AND success_rate <= 1"
      - name: failure_rate
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0 AND failure_rate <= 1"

  - name: mart_return_by_product
    description: >
      Phân tích tỷ lệ hoàn trả theo sản phẩm và nhà cung cấp (ecommerce only).
      Grain: 1 row = 1 sản phẩm.
      Lưu ý: fact_returns ở cấp order, nên return_rate là xấp xỉ tại cấp sản phẩm.
      Phục vụ: Product quality team, Procurement, Buyer team.
    columns:
      - name: product_sk
        tests:
          - unique
          - not_null
      - name: return_rate
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0 AND return_rate <= 1"
