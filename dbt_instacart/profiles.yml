dbt_instacart:
  target: dev
  outputs:
    dev:
      type: clickhouse
      driver: http
      host: clickhouse
      port: 8123
      user: admin
      password: "1234"
      schema: default
      threads: 2                  # Giảm từ 4→2 để tránh OOM khi bảng lớn
      send_receive_timeout: 900   # Tăng timeout lên 15 phút (mặc định 300s)
